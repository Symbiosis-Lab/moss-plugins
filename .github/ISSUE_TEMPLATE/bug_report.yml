name: Bug report
description: Report a bug in a moss plugin
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.
        For questions or general discussion, use [Discussions](../discussions) instead.
  - type: dropdown
    id: plugin
    attributes:
      label: Which plugin?
      options:
        - github
        - matters
        - douban
        - linkedin
        - substack
        - x
        - xiaohongshu
        - other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Plugin version
      placeholder: "e.g. 1.5.1"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: "node --version"
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Smallest code that triggers the bug.
      render: typescript
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
